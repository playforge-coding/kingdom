site_name: Kingdom
site_description: A single-player kingdom-builder written in Rust, rendered with wgpu.
site_url: https://playforge-coding.github.io/kingdom/
repo_url: https://github.com/playforge-coding/kingdom
repo_name: playforge-coding/kingdom
copyright: Documentation licensed CC BY-NC-SA 4.0 · Game code licensed AGPL-3.0-only

theme:
  name: material
  # Disable Zensical's Google Fonts CDN loading; we self-host instead. The
  # webfonts and stylesheets/fonts.css are generated by scripts/fetch-fonts.py.
  font: false
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: amber
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: amber
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  custom_dir: docs/overrides
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow

extra_css:
  - stylesheets/fonts.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Controls & HUD: controls.md
  - Gameplay: gameplay.md
  - Building: building.md
  - Units & Combat: units.md
  - The World: world.md
  - Saves & Files: saves.md
  - Credits: credits.md
